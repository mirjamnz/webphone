<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Call Recordings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Standalone page adjustments */
        body { padding: 40px 20px; align-items: flex-start; justify-content: center; height: auto; min-height: 100vh; }
        .recordings-wrapper { max-width: 800px; width: 100%; background: var(--bg-panel); border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .header h2 { margin: 0; color: var(--text-main); }
        .audio-player-container { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 12px; position: sticky; bottom: 20px; border: 1px solid var(--border); display: none; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        audio { width: 100%; outline: none; border-radius: 8px; }
        .recording-card { background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); transition: all 0.2s; }
        .recording-card:hover { border-color: var(--primary); background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="recordings-wrapper">
        <div class="header">
            <img src="public/images/Hero_logo.png" alt="Hero" style="height: 40px;">
            <h2>Call Recordings Archive</h2>
        </div>
        
        <div id="loading" class="loading-spinner">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Loading recordings from database...
        </div>
        
        <div id="recordingsList" class="supervisor-list"></div>
        
        <div id="audioModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.8); backdrop-filter: blur(5px);">
            <div class="modal-content" style="background-color:#1a1d21; margin:15% auto; padding:30px; border:1px solid #343a40; width:450px; border-radius:15px; position:relative; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <span class="close-modal" style="position:absolute; top:15px; right:20px; color:#adb5bd; font-size:28px; font-weight:bold; cursor:pointer;">&times;</span>
                
                <div style="margin-bottom:20px;">
                    <i class="fa-solid fa-circle-play" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
                    <h3 id="modalTitle" style="color:white; margin:0; font-size: 1.1rem;">Call Recording</h3>
                    <p id="modalSubtitle" style="color:var(--text-muted); font-size:0.85rem; margin-top:5px;"></p>
                </div>
        
                <audio id="audioPlayer" controls style="width:100%; margin-top:10px; border-radius: 8px;">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>

    <script type="module" src="js/recordings-app.js"></script>
</body>
</html>
